spring:
  flyway:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:abqdesibites}
    user: ${PGUSER:postgres}
    password: ${PGPASSWORD:${DB_PASSWORD:postgres123}}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

logging:
  level:
    com.abqdesibites: INFO
